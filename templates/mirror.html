<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Mirror Pro</title>
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body class="dark-theme">

    <section id="config-panel" style="background: #1a1a1a; padding: 20px; border-bottom: 2px solid #333;">
        <h3 style="margin-top: 0; color: #aaa;">إعدادات الذكاء الاصطناعي</h3>
        <textarea id="sys-prompt" style="width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px;">You are a strict Mermaid diagram generator. Output ONLY valid mermaid code blocks. Every node connection (e.g., A --> B) MUST be written on a completely new line. Do NOT combine multiple connections into a single line. Do NOT write any conversational text or summary before or after the code block. Start with ```mermaid and end with ```.</textarea>
        <button onclick="saveConfig()" style="margin-top: 10px; padding: 8px 20px; cursor: pointer;">حفظ الإعدادات</button>
    </section>

    <div class="app-container">
        <header class="main-header">
            <div class="logo">Groq<span>Mirror</span></div>
            <div class="actions">
                <button id="clear-btn" onclick="document.getElementById('chat-container').innerHTML=''">Clear</button>
            </div>
        </header>
        <main id="chat-container" class="chat-area"></main>
    </div>

    <script>
        let eventSource = null;

        // تهيئة مكتبة Mermaid بشكل مسبق ومنعها من العمل التلقائي حتى يكتمل النص
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose'
        });

        // تخصيص Marked المحدث ليتوافق مع كافة إصدارات المكتبة
        const renderer = new marked.Renderer();
        renderer.code = function(codeObj) {
            const text = codeObj.text || codeObj;
            const lang = codeObj.lang || '';
            
            if (lang === 'mermaid' || text.includes('graph TD') || text.includes('graph LR') || text.includes('graph TB')) {
                return `<div class="mermaid">${text}</div>`;
            }
            return `<pre><code class="language-${lang}">${text}</code></pre>`;
        };
        marked.setOptions({ renderer: renderer });

        async function saveConfig() {
            const prompt = document.getElementById('sys-prompt').value;
            const response = await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({base_prompt: prompt})
            });
            if (response.ok) alert("تم تحديث الإعدادات!");
        }

        // دالة عرض وتحديث المحتوى النصي أثناء البث
        function renderStreamingContent(element, rawText) {
            // محاولة أولية لتنظيف الأسطر الملتصقة حتى أثناء الستريم ليراها المستخدم منسقة
            let cleanStreaming = rawText
                .replace(/mermaidgraph/gi, "graph TD\n")
                .replace(/(graph\s+(?:TD|LR|TB|BT))/gi, "$1\n");
                
            element.innerHTML = marked.parse(cleanStreaming);
            element.querySelectorAll('pre code:not(.hljs)').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // دالة معالجة وتصحيح الرسم البياني النهائية الصارمة
        async function finalizeRender(element) {
            try {
                // تحويل أي نص يحتوي على هيكلية ميرميد مدمجة إلى وسم كلاس mermaid لو سقط من دالة الـ parse
                if (!element.querySelector('.mermaid') && (element.innerText.includes('graph TD') || element.innerText.includes('graph LR'))) {
                    element.innerHTML = `<div class="mermaid">${element.innerText}</div>`;
                }

                const textNodes = element.querySelectorAll('.mermaid');
                textNodes.forEach(node => {
                    let code = node.innerText;
                    
                    // تنظيف التسمية الملتصقة بالسيرفر
                    code = code.replace(/mermaidgraph/gi, "graph TD");
                    
                    // تصحيح الأسهم التالفة أو المشوهة التي يرسلها الموديل أحياناً
                    code = code.replace(/->>/g, " --> ");
                    code = code.replace(/->/g, " --> ");
                    code = code.replace(/--\s*>/g, " --> ");

                    // الكود السحري: فصل العلاقات المشوهة والمدمجة في سطر واحد بأسطر عمودية جديدة
                    // يبحث عن انتهاء تعريف العقدة ] أو ) أو وسم الـ subgraph ويضع سطر جديد فوراً إذا تبعها كود آخر
                    code = code.replace(/(\s*subgraph\s+[A-Za-z0-9_]+)/gi, "\n$1\n");
                    code = code.replace(/(\])\s*([A-Za-z0-9_]+)(\[|\()/gi, "$1\n$2$3");
                    code = code.replace(/(\))\s*([A-Za-z0-9_]+)(\[|\()/gi, "$1\n$2$3");
                    
                    // البحث عن العلاقات الملتصقة (مثل: A-->B C-->D) وفصلها لأسطر جديدة
                    code = code.replace(/(\S+\s*-->\s*[^\]\[\)\(]+?(?:\]|\)|[\s\w]+))\s+([A-Za-z0-9_]+\s*-->)/gi, "$1\n$2");
                    
                    // تنظيف أي تكرار ناتج عن الـ Error الخارجي المقصوص
                    code = code.replace(/(Error\s*){2,}/gi, "Error1 ");
                    code = code.replace(/end\s+end/gi, "end");

                    // إعادة البناء والترتيب النهائي للأسطر
                    code = code.split('\n')
                               .map(line => line.trim())
                               .filter(line => line.length > 0)
                               .join('\n');
                    
                    node.innerText = code;
                });

                if (textNodes.length > 0) {
                    await mermaid.run({
                        nodes: textNodes
                    });
                }
            } catch (error) {
                console.error("Mermaid parsing error:", error);
                element.querySelectorAll('.mermaid').forEach(node => {
                    node.style.borderLeft = "3px solid #ff4444";
                    node.style.paddingLeft = "10px";
                });
            }
        }

        function initMirrorListener() {
            if (eventSource) {
                eventSource.close();
            }

            const chatContainer = document.getElementById('chat-container');
            eventSource = new EventSource('/api/stream-mirror');
            
            let currentMessageDiv = null;
            let accumulatedText = ""; 

            eventSource.onmessage = async (event) => {
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch (e) {
                    return;
                }
                
                if (data.content === "[DONE]" || data.content === "[DONE]\n\n") {
                    if (currentMessageDiv) {
                        await finalizeRender(currentMessageDiv);
                    }
                    currentMessageDiv = null;
                    accumulatedText = "";
                    return;
                }

                if (!data.content) return;

                if (!currentMessageDiv) {
                    currentMessageDiv = document.createElement('div');
                    currentMessageDiv.className = 'message ai-message';
                    chatContainer.appendChild(currentMessageDiv);
                    accumulatedText = "";
                }

                accumulatedText += data.content;
                renderStreamingContent(currentMessageDiv, accumulatedText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            eventSource.onerror = () => {
                console.log("Connection lost, reconnecting...");
                eventSource.close();
                setTimeout(initMirrorListener, 5000);
            };
        }

        initMirrorListener();
    </script>
</body>
</html>
