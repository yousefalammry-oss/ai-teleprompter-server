<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Mirror Pro</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <header class="main-header">
            <div class="logo">Groq<span>Mirror</span></div>
            <div class="actions">
                <button id="clear-btn" title="Clear Chat">Clear</button>
            </div>
        </header>

        <main id="chat-container" class="chat-area"></main>

        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Type a message or a Mermaid request..." rows="1"></textarea>
                <div class="button-group">
                    <button id="send-btn" class="primary-btn">Send</button>
                    <button id="stop-btn" class="secondary-btn hidden">Stop</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // دالة عرض المحتوى وتحديث الـ Markdown والـ Mermaid
        function renderContent(element) {
            element.innerHTML = marked.parse(element.innerText);
            mermaid.init(undefined, element.querySelectorAll('.mermaid'));
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // مستمع البث المباشر (SSE)
       function initMirrorListener() {
        const chatContainer = document.getElementById('chat-container');
        const source = new EventSource('/api/stream-mirror');
        let currentMessageDiv = null;

        source.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // إذا وصل إشارة النهاية، نقوم بتهيئته للسؤال القادم
            if (data.content === "[DONE]") {
                currentMessageDiv = null;
                return;
            }

            if (!data.content) return;

            // إذا كانت بداية رد جديد (currentMessageDiv فارغ)
            if (!currentMessageDiv) {
                // إظهار رسالة "تم استلام السؤال"
                const statusDiv = document.createElement('div');
                statusDiv.className = 'status-msg';
                statusDiv.innerText = 'تم استلام السؤال...';
                chatContainer.appendChild(statusDiv);

                // إنشاء فقاعة الرد
                currentMessageDiv = document.createElement('div');
                currentMessageDiv.className = 'message ai-message';
                chatContainer.appendChild(currentMessageDiv);
                
                // إخفاء رسالة الاستلام بعد لحظات
                setTimeout(() => statusDiv.style.display = 'none', 1000);
            }

            // إضافة النص وتحديث العرض
            currentMessageDiv.innerText += data.content;
            renderContent(currentMessageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        source.onerror = () => {
            setTimeout(initMirrorListener, 3000);
        };
    }

        // تشغيل البث عند تحميل الصفحة
        initMirrorListener();
    </script>
    
    <script type="module" src="/static/app.js"></script>
</body>
</html>
