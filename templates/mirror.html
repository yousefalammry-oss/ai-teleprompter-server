<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Mirror Pro</title>
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body class="dark-theme">

    <section id="config-panel" style="background: #1a1a1a; padding: 20px; border-bottom: 2px solid #333;">
        <h3 style="margin-top: 0; color: #aaa;">إعدادات الذكاء الاصطناعي</h3>
        <textarea id="sys-prompt" style="width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px;">أنت خبير في إنشاء الرسوم البيانية. استخدم كود Mermaid حصراً داخل ```mermaid [الكود] ```. ممنوع استخدام رسومات ASCII نهائياً.</textarea>
        <button onclick="saveConfig()" style="margin-top: 10px; padding: 8px 20px; cursor: pointer;">حفظ الإعدادات</button>
    </section>

    <div class="app-container">
        <header class="main-header">
            <div class="logo">Groq<span>Mirror</span></div>
            <div class="actions">
                <button id="clear-btn" onclick="document.getElementById('chat-container').innerHTML=''">Clear</button>
            </div>
        </header>
        <main id="chat-container" class="chat-area"></main>
    </div>

    <script>
        let eventSource = null;

        // تهيئة مكتبة Mermaid بشكل مسبق ومنعها من العمل التلقائي حتى يكتمل النص
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose'
        });

        // تخصيص Marked المحدث ليتوافق مع كافة إصدارات المكتبة القديمة والحديثة بشكل مستقر
        const renderer = new marked.Renderer();
        renderer.code = function(codeObj) {
            const text = codeObj.text || codeObj;
            const lang = codeObj.lang || '';
            
            if (lang === 'mermaid') {
                return `<div class="mermaid">${text}</div>`;
            }
            return `<pre><code class="language-${lang}">${text}</code></pre>`;
        };
        marked.setOptions({ renderer: renderer });

        async function saveConfig() {
            const prompt = document.getElementById('sys-prompt').value;
            const response = await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({base_prompt: prompt})
            });
            if (response.ok) alert("تم تحديث الإعدادات!");
        }

        // دالة عرض وتحديث المحتوى النصي أثناء البث
        function renderStreamingContent(element, rawText) {
            element.innerHTML = marked.parse(rawText);
            element.querySelectorAll('pre code:not(.hljs)').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // دالة معالجة وتصحيح الرسم البياني النهائية بعد اكتمال وصول النص بالكامل
        async function finalizeRender(element) {
            try {
                const textNodes = element.querySelectorAll('.mermaid');
                textNodes.forEach(node => {
                    let code = node.innerText;
                    
                    // 1. إزالة الأوساخ والنصوص العادية التي تظهر بعد كود الميرميد
                    if (code.includes("graph TD") || code.includes("graph LR") || code.includes("graph TB")) {
                        // تنظيف الأسهم المشوهة ->> وتحويلها لأسهم ميرميد قياسية -->
                        code = code.replace(/->>/g, " --> ");
                        code = code.replace(/->/g, " --> ");
                        
                        // معالجة النصوص الملتصقة بأسطر جديدة
                        code = code.split('\n').map(line => line.trim()).filter(line => line.length > 0).join('\n');
                        
                        // إزالة الكلمات المتكررة التالفة في الأسطر الأخيرة (مثل Error Error Error)
                        code = code.replace(/(Error\s*){2,}/gi, "Error1 ");
                    }
                    
                    node.innerText = code;
                });

                if (textNodes.length > 0) {
                    await mermaid.run({
                        nodes: textNodes
                    });
                }
            } catch (error) {
                console.error("Mermaid parsing error:", error);
                // في حال فشل الرسم التلقائي بسبب تلف شديد، يتم إظهار تنبيه مرئي جانبي لسهولة التتبع
                element.querySelectorAll('.mermaid').forEach(node => {
                    node.style.borderLeft = "3px solid #ff4444";
                    node.style.paddingLeft = "10px";
                });
            }
        }

        function initMirrorListener() {
            if (eventSource) {
                eventSource.close();
            }

            const chatContainer = document.getElementById('chat-container');
            eventSource = new EventSource('/api/stream-mirror');
            
            let currentMessageDiv = null;
            let accumulatedText = ""; 

            eventSource.onmessage = async (event) => {
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch (e) {
                    return;
                }
                
                if (data.content === "[DONE]" || data.content === "[DONE]\n\n") {
                    if (currentMessageDiv) {
                        await finalizeRender(currentMessageDiv);
                    }
                    currentMessageDiv = null;
                    accumulatedText = "";
                    return;
                }

                if (!data.content) return;

                if (!currentMessageDiv) {
                    currentMessageDiv = document.createElement('div');
                    currentMessageDiv.className = 'message ai-message';
                    chatContainer.appendChild(currentMessageDiv);
                    accumulatedText = "";
                }

                accumulatedText += data.content;
                renderStreamingContent(currentMessageDiv, accumulatedText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            eventSource.onerror = () => {
                console.log("Connection lost, reconnecting...");
                eventSource.close();
                setTimeout(initMirrorListener, 5000);
            };
        }

        // بدء تشغيل مستمع البث عند تحميل الصفحة
        initMirrorListener();
    </script>
</body>
</html>
