<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Mirror Pro</title>
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        /* حاوية مؤقتة أثناء البث تعرض النص الخام بشكل مقروء قبل تحويله لرسم */
        .mermaid-streaming {
            white-space: pre-wrap;
            font-family: monospace;
            color: #888;
            background: #111;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body class="dark-theme">

    <section id="config-panel" style="background: #1a1a1a; padding: 20px; border-bottom: 2px solid #333;">
        <h3 style="margin-top: 0; color: #aaa;">إعدادات الذكاء الاصطناعي</h3>
        <textarea id="sys-prompt" style="width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px;">You are a strict Mermaid diagram generator. Output ONLY valid mermaid code blocks. Every node connection (e.g., A --> B) MUST be written on a completely new line. Do NOT combine multiple connections into a single line. Do NOT write any conversational text or summary before or after the code block. Start with ```mermaid and end with ```.</textarea>
        <button onclick="saveConfig()" style="margin-top: 10px; padding: 8px 20px; cursor: pointer;">حفظ الإعدادات</button>
    </section>

    <div class="app-container">
        <header class="main-header">
            <div class="logo">Groq<span>Mirror</span></div>
            <div class="actions">
                <button id="clear-btn" onclick="document.getElementById('chat-container').innerHTML=''">Clear</button>
            </div>
        </header>
        <main id="chat-container" class="chat-area"></main>
    </div>

    <script>
        let eventSource = null;

        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose'
        });

        const renderer = new marked.Renderer();
        renderer.code = function(codeObj) {
            const text = codeObj.text || codeObj;
            const lang = codeObj.lang || '';

            if (lang === 'mermaid' || looksLikeMermaid(text)) {
                return `<div class="mermaid">${text}</div>`;
            }
            return `<pre><code class="language-${lang}">${text}</code></pre>`;
        };
        marked.setOptions({ renderer: renderer });

        // === الإصلاح الأساسي ===
        // النصوص القادمة من الموديل غالباً بلا ```mermaid على الإطلاق،
        // لذا نكتشفها مباشرة بدل الاعتماد على marked لتمييزها كـ code block
        function looksLikeMermaid(text) {
            return /graph\s+(TD|LR|TB|BT|RL)/i.test(text)
                || /-->/.test(text)
                || /^\s*mermaidgraph/i.test(text);
        }

        async function saveConfig() {
            const prompt = document.getElementById('sys-prompt').value;
            const response = await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({base_prompt: prompt})
            });
            if (response.ok) alert("تم تحديث الإعدادات!");
        }

        // أثناء البث: لو النص يبدو كمخطط ميرميد، نعرضه كنص خام (بدون محاولة رسمه وهو غير مكتمل)
        // لأن رسم مخطط ناقص بشكل متكرر يسبب أخطاء ووميض في الواجهة
        function renderStreamingContent(element, rawText) {
            if (looksLikeMermaid(rawText)) {
                element.classList.add('mermaid-streaming');
                element.classList.remove('mermaid');
                element.innerText = rawText;
                return;
            }

            element.classList.remove('mermaid-streaming');
            element.innerHTML = marked.parse(rawText);
            element.querySelectorAll('pre code:not(.hljs)').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // عند اكتمال الرسالة: تنظيف الكود المشوه ثم رسمه فعلياً عبر mermaid.run
        async function finalizeRender(element) {
            try {
                const raw = element.innerText;

                if (!looksLikeMermaid(raw)) {
                    // محتوى نصي عادي، عرضه بشكل طبيعي عبر marked
                    element.classList.remove('mermaid-streaming');
                    element.innerHTML = marked.parse(raw);
                    element.querySelectorAll('pre code:not(.hljs)').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                    return;
                }

                let code = raw;

                // === إزالة أسوار الكود (```mermaid ... ```) إن وجدت ===
                // هذا كان سبب المشكلة الظاهرة في الصورة: النص يصل ومعه العلامات
                // فيفشل mermaid في تفسيره ويظل معروضاً كنص خام
                code = code.replace(/```mermaid/gi, "");
                code = code.replace(/```/g, "");

                // تنظيف التسمية الملتصقة بالسيرفر
                code = code.replace(/mermaidgraph/gi, "graph TD");

                // تصحيح الأسهم التالفة أو المشوهة
                code = code.replace(/->>/g, " --> ");
                code = code.replace(/->/g, " --> ");
                code = code.replace(/--\s*>/g, " --> ");

                // فصل subgraph وعقد العلاقات المدمجة في سطر واحد بأسطر جديدة
                code = code.replace(/(\s*subgraph\s+[A-Za-z0-9_]+)/gi, "\n$1\n");
                code = code.replace(/(\])\s*([A-Za-z0-9_]+)(\[|\()/gi, "$1\n$2$3");
                code = code.replace(/(\))\s*([A-Za-z0-9_]+)(\[|\()/gi, "$1\n$2$3");
                code = code.replace(/(\S+\s*-->\s*[^\]\[\)\(]+?(?:\]|\)|[\s\w]+))\s+([A-Za-z0-9_]+\s*-->)/gi, "$1\n$2");
                code = code.replace(/(Error\s*){2,}/gi, "Error1 ");
                code = code.replace(/end\s+end/gi, "end");

                // فصل كلمة "end" الخاصة بإغلاق subgraph عن العقدة التالية لها إن التصقت
                code = code.replace(/\bend\b(?=\S)/gi, "end\n");

                code = code.split('\n')
                           .map(line => line.trim())
                           .filter(line => line.length > 0)
                           .join('\n');

                element.classList.remove('mermaid-streaming');
                element.classList.add('mermaid');
                element.innerHTML = '';
                element.innerText = code;

                await mermaid.run({ nodes: [element] });

            } catch (error) {
                console.error("Mermaid parsing error:", error);
                element.style.borderLeft = "3px solid #ff4444";
                element.style.paddingLeft = "10px";
            }
        }

        function initMirrorListener() {
            if (eventSource) {
                eventSource.close();
            }

            const chatContainer = document.getElementById('chat-container');
            eventSource = new EventSource('/api/stream-mirror');

            let currentMessageDiv = null;
            let accumulatedText = "";

            eventSource.onmessage = async (event) => {
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch (e) {
                    return;
                }

                if (data.content === "[DONE]" || data.content === "[DONE]\n\n") {
                    if (currentMessageDiv) {
                        await finalizeRender(currentMessageDiv);
                    }
                    currentMessageDiv = null;
                    accumulatedText = "";
                    return;
                }

                if (!data.content) return;

                if (!currentMessageDiv) {
                    currentMessageDiv = document.createElement('div');
                    currentMessageDiv.className = 'message ai-message';
                    chatContainer.appendChild(currentMessageDiv);
                    accumulatedText = "";
                }

                accumulatedText += data.content;
                renderStreamingContent(currentMessageDiv, accumulatedText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            eventSource.onerror = () => {
                console.log("Connection lost, reconnecting...");
                eventSource.close();
                setTimeout(initMirrorListener, 5000);
            };
        }

        initMirrorListener();
    </script>
</body>
</html>
